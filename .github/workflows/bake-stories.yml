name: Bake Stories

on:
  schedule:
    - cron: '0 3 * * *'   # daily at 3 AM UTC
  workflow_dispatch:        # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  bake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch stories from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          curl -sf \
            "${SUPABASE_URL}/rest/v1/history_stories?select=id,subject,wikipedia_title,story_text,categories,created_at,updated_at&order=created_at.desc" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -o individual.json

          curl -sf \
            "${SUPABASE_URL}/rest/v1/timeline_stories?select=id,title,region,year_from,year_to,chapters,full_story,pages_used,created_at,updated_at&order=created_at.desc" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -o timeline.json

          jq -n \
            --slurpfile ind individual.json \
            --slurpfile tl  timeline.json \
            '{ individual: $ind[0], timeline: $tl[0] }' \
            > stories.json

          echo "Individual: $(jq '.individual | length' stories.json)  Timeline: $(jq '.timeline | length' stories.json)"

      - name: Commit stories.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stories.json
          if git diff --staged --quiet; then
            echo "No changes to stories.json"
          else
            git commit -m "chore: bake stories.json [skip ci]"
            git push
          fi
